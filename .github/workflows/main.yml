      - name: Commit and push with pull and retry
        env:
          PAT_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f streams.m3u8
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git commit -m "🔄 Update HD playlist [$(date -u +%H:%M)]"
          
          # Pull and push with retry logic
          MAX_RETRIES=5
          DELAY=10
          SUCCESS=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "📤 Attempt $i/$MAX_RETRIES: Pulling latest changes..."
            
            # Pull with rebase to avoid merge commits
            git pull --rebase origin main || {
              echo "⚠️ Pull failed, trying merge..."
              git pull origin main || true
            }
            
            echo "📤 Push attempt $i/$MAX_RETRIES..."
            if git push https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git HEAD:main; then
              echo "✅ Successfully pushed on attempt $i"
              SUCCESS=true
              break
            else
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️ Push failed, waiting ${DELAY}s before retry..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              fi
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ All push attempts failed after $MAX_RETRIES retries"
            exit 1
          fi
