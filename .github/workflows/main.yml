name: YouTube Live M3U8 Generator
run-name: Generate HD Playlist with Smart Quality Selection 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Refresh every 6 hours
  push:
    paths:
      - 'streams.txt'
      - 'generate.py'
      - '.github/workflows/main.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Setup Python & dependencies
        run: |
          pip install --upgrade pip yt-dlp requests
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Setup Cloudflare WARP
        continue-on-error: true
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools iptables
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          wgcf register --accept-tos
          wgcf generate
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          sudo wg-quick up /etc/wireguard/wgcf.conf || true
          echo "✅ WARP setup complete"

      - name: Create cookies file securely
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          install -m 600 /dev/null cookies.txt
          echo "$COOKIES" > cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Run enhanced playlist generator
        id: generate
        run: |
          python generate.py

      - name: Prepare for GitHub Pages
        run: |
          # Create .nojekyll
          touch .nojekyll
          
          # Create _config.yml
          cat > _config.yml << 'EOF'
          include:
            - "*.m3u8"
            - "*.xml"
            - "*.json"
            - "logos/"
          mime_types:
            m3u8: application/vnd.apple.mpegurl
            xml: application/xml
          EOF

      - name: Commit and push generated files
        env:
          PAT_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all generated files
          git add -f streams*.m3u8 epg.xml stats.json .nojekyll _config.yml logos/ .channel_cache.json || true
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          git commit -m "🔄 Update playlists [$(date -u +%H:%M)]"
          
          # Push with retry
          MAX_RETRIES=5
          DELAY=10
          SUCCESS=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "📤 Attempt $i/$MAX_RETRIES..."
            
            git pull --rebase origin main || git pull origin main || true
            
            if git push "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main; then
              echo "✅ Pushed on attempt $i"
              SUCCESS=true
              break
            else
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️ Retry in ${DELAY}s..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              fi
            fi
          done

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f cookies.txt wgcf-profile.conf
          echo "🧹 Cleaned up"
