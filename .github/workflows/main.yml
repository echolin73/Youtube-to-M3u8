name: YouTube Live M3U8 Generator
run-name: Debug mode - testing cookies 🎬

on:
  workflow_dispatch:
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          pip install --upgrade yt-dlp
          echo "yt-dlp version: $(yt-dlp --version)"

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
            echo "✅ Cookies file created ($(wc -l < cookies.txt) lines)"
            echo "First line: $(head -1 cookies.txt)"
          else
            echo "⚠️ No cookies secret found"
            exit 1
          fi

      - name: Debug yt-dlp with cookies
        run: |
          echo "🔍 Starting debug..."
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la
          
          echo ""
          echo "📄 Checking cookies.txt:"
          if [ -f "cookies.txt" ]; then
            echo "✅ cookies.txt exists"
            echo "File size: $(wc -l < cookies.txt) lines"
            echo "First 2 lines:"
            head -2 cookies.txt
          else
            echo "❌ cookies.txt not found"
            exit 1
          fi
          
          echo ""
          echo "🔑 Testing yt-dlp with cookies..."
          yt-dlp --cookies cookies.txt --verbose --simulate "https://www.youtube.com/@AriseNewsChannel/live" 2>&1
          
          echo ""
          echo "✅ Debug complete"

      - name: Test with video ID
        run: |
          echo ""
          echo "🎬 Testing with known video ID..."
          # Try the video ID we know from your local test
          yt-dlp --cookies cookies.txt --verbose -F "https://www.youtube.com/watch?v=x4wL-fWyhI0" 2>&1
