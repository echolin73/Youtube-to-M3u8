name: YouTube Live M3U8 Generator
run-name: Generate HD Playlist with Smart Quality Selection 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Refresh every 6 hours
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Setup Python, yt-dlp and Streamlink
        run: |
          pip install --upgrade pip yt-dlp streamlink requests
          echo "✅ yt-dlp: $(yt-dlp --version)"
          echo "✅ Streamlink: $(streamlink --version | head -1)"

      - name: Setup Cloudflare WARP
        continue-on-error: true
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools iptables
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          wgcf register --accept-tos
          wgcf generate
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          sudo wg-quick up /etc/wireguard/wgcf.conf || true
          echo "✅ WARP setup complete"

      - name: Create cookies file securely
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          install -m 600 /dev/null cookies.txt
          echo "$COOKIES" > cookies.txt
          echo "::add-mask::$(echo "$COOKIES" | head -1 | cut -f7)"
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate Streamlink playlist (No Stutter)
        id: generate
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import streamlink
          import time
          import random
          import re
          import os
          import sys
          import requests
          from datetime import datetime, timezone
          from urllib.parse import quote

          def get_stream_info(url, cookies_file):
              """Get video info using yt-dlp."""
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 30,
                  'retries': 3,
                  'extractor_args': {
                      'youtube': {
                          'player_client': ['web', 'android'],
                          'player_skip': ['webpage', 'configs', 'js']
                      }
                  }
              }
              
              try:
                  with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                      info = ydl.extract_info(url, download=False)
                      
                      if not info:
                          return None, None, None
                      
                      video_id = info.get('id')
                      title = info.get('title', 'Unknown')
                      
                      # Check if live
                      is_live = info.get('is_live', False)
                      live_status = info.get('live_status', '')
                      
                      if not (is_live or live_status == 'is_live'):
                          print(f"  ⚠️ Not currently live")
                          return None, video_id, None

                      # Get quality info from formats
                      formats = info.get('formats', [])
                      video_formats = [
                          f for f in formats 
                          if f.get('height') and f.get('vcodec') != 'none'
                      ]
                      
                      if video_formats:
                          best = max(video_formats, key=lambda x: (x.get('height', 0), x.get('fps', 0)))
                          height = best.get('height', 0)
                          fps = best.get('fps', 0)
                          
                          quality_tag = f"{height}p"
                          if fps > 30:
                              quality_tag += f"{int(fps)}"
                          
                          fmt_info = {
                              'height': height,
                              'quality_tag': quality_tag,
                              'fps': fps
                          }
                      else:
                          fmt_info = {'height': 0, 'quality_tag': 'Unknown', 'fps': 0}
                      
                      return video_id, title, fmt_info
                          
              except Exception as e:
                  print(f"  ⚠️ Error: {str(e)[:150]}")
                  return None, None, None

          def test_streamlink(video_id):
              """Test if Streamlink can handle this video."""
              try:
                  session = streamlink.Streamlink()
                  # Set options to avoid throttling
                  session.set_option('http-headers', {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                  })
                  
                  youtube_url = f"https://www.youtube.com/watch?v={video_id}"
                  streams = session.streams(youtube_url)
                  
                  if streams:
                      # Get best quality stream
                      best = streams.get('best') or streams.get('1080p') or streams.get('720p') or list(streams.values())[0]
                      return True, best.name
                  return False, None
                  
              except Exception as e:
                  print(f"  Streamlink test failed: {e}")
                  return False, None

          # Read streams.txt
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              sys.exit(0)

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          if not lines:
              print("⚠️ No streams found")
              sys.exit(0)

          # Generate M3U8 with Streamlink URLs
          m3u8 = [
              "#EXTM3U",
              "#EXT-X-VERSION:3",
              f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Playlist optimized for Streamlink (No Stutter)",
              f"# Total channels: {len(lines)}",
              f"#",
              f"# HOW TO USE:",
              f"# 1. Install Streamlink: https://streamlink.github.io/install.html",
              f"# 2. Play with: streamlink --player vlc 'URL' best",
              f"# 3. Or use: streamlink --player mpv 'URL' best",
              f"#",
              ""
          ]

          active = 0
          quality_stats = {"1080p": 0, "720p": 0, "480p": 0, "other": 0}
          active_channels = []
          offline_channels = []
          error_channels = []
          streamlink_working = []

          for i, line in enumerate(lines, 1):
              print(f"\n📺 [{i}/{len(lines)}] Processing: {line}")
              time.sleep(random.uniform(2, 5))
              
              video_id, title, fmt_info = get_stream_info(line, 'cookies.txt')
              
              # Extract channel name
              name_match = re.search(r'@([^/]+)', line)
              channel_name = name_match.group(1) if name_match else f"Channel{i}"
              channel_name = re.sub(r'[^\w\s-]', '', channel_name).strip()
              
              if video_id and fmt_info:
                  height = fmt_info.get('height', 0)
                  quality_tag = fmt_info.get('quality_tag', 'Unknown')
                  
                  # Test Streamlink compatibility
                  print(f"  🧪 Testing Streamlink...")
                  sl_ok, sl_quality = test_streamlink(video_id)
                  
                  if sl_ok:
                      active += 1
                      active_channels.append(channel_name)
                      streamlink_working.append(channel_name)
                      
                      if height >= 1080:
                          quality_stats["1080p"] += 1
                      elif height >= 720:
                          quality_stats["720p"] += 1
                      elif height >= 480:
                          quality_stats["480p"] += 1
                      else:
                          quality_stats["other"] += 1
                      
                      print(f"  ✅ Streamlink OK: {quality_tag}")
                      
                      # Streamlink-compatible URL format
                      # Uses youtube.com URL with video ID - Streamlink handles the rest
                      youtube_url = f"https://www.youtube.com/watch?v={video_id}"
                      
                      # Add special marker for Streamlink players
                      m3u8.append(f'#EXTINF:-1 tvg-id="{video_id}" tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} [{quality_tag}]')
                      m3u8.append(f'{youtube_url}')
                      m3u8.append("")
                  else:
                      print(f"  ⚠️ Streamlink failed, using fallback")
                      offline_channels.append(channel_name)
                      youtube_url = f"https://www.youtube.com/watch?v={video_id}"
                      m3u8.append(f'#EXTINF:-1 tvg-id="{video_id}" tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} [Fallback]')
                      m3u8.append(youtube_url)
                      m3u8.append("")
                      
              elif video_id:
                  print(f"  ⚠️ Channel offline")
                  offline_channels.append(channel_name)
                  youtube_url = f"https://www.youtube.com/watch?v={video_id}"
                  m3u8.append(f'#EXTINF:-1 tvg-id="{video_id}" tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} [Offline]')
                  m3u8.append(youtube_url)
                  m3u8.append("")
              else:
                  print(f"  ❌ Failed to extract")
                  error_channels.append(channel_name)
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} [Error]')
                  m3u8.append(line)
                  m3u8.append("")

          # Add summary
          m3u8.extend([
              "",
              f"# Summary: {active}/{len(lines)} streams active",
              f"# Streamlink compatible: {len(streamlink_working)}",
              f"# Quality: {quality_stats['1080p']}x1080p, {quality_stats['720p']}x720p, {quality_stats['480p']}x480p",
              f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"
          ])

          # Write M3U8
          with open('streams.m3u8', 'w', encoding='utf-8') as f:
              f.write('\n'.join(m3u8))

          # Also generate Streamlink command file
          with open('streamlink_playlist.sh', 'w') as f:
              f.write('#!/bin/bash\n')
              f.write('# Streamlink playlist - Run: bash streamlink_playlist.sh\n\n')
              for ch in streamlink_working:
                  # Find video ID for this channel
                  f.write(f'echo "Playing {ch}..."\n')
                  f.write(f'streamlink --player vlc "https://www.youtube.com/@{ch}/live" best &\n')
                  f.write('sleep 2\n')
              f.write('wait\n')

          # Save stats
          with open('stats.txt', 'w') as f:
              f.write(f"active={active}\n")
              f.write(f"total={len(lines)}\n")
              f.write(f"quality_1080p={quality_stats['1080p']}\n")
              f.write(f"quality_720p={quality_stats['720p']}\n")
              f.write(f"quality_480p={quality_stats['480p']}\n")
              f.write(f"streamlink_working={len(streamlink_working)}\n")
              f.write(f"active_channels={','.join(active_channels)}\n")
              f.write(f"offline_channels={','.join(offline_channels)}\n")
              f.write(f"error_channels={','.join(error_channels)}\n")

          print(f"\n{'='*50}")
          print(f"📊 FINAL: {active}/{len(lines)} streams active")
          print(f"📊 Streamlink compatible: {len(streamlink_working)}")
          print(f"📊 Quality: 1080p:{quality_stats['1080p']} 720p:{quality_stats['720p']} 480p:{quality_stats['480p']}")
          print(f"{'='*50}")

          PYTHON_EOF

          python generate.py

      - name: Load stats
        id: stats
        run: |
          source stats.txt
          echo "active=$active" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "quality_1080p=$quality_1080p" >> $GITHUB_OUTPUT
          echo "quality_720p=$quality_720p" >> $GITHUB_OUTPUT
          echo "quality_480p=$quality_480p" >> $GITHUB_OUTPUT
          echo "streamlink_working=$streamlink_working" >> $GITHUB_OUTPUT
          echo "active_channels=$active_channels" >> $GITHUB_OUTPUT
          echo "offline_channels=$offline_channels" >> $GITHUB_OUTPUT
          echo "error_channels=$error_channels" >> $GITHUB_OUTPUT

      - name: Validate and clean M3U8
        run: |
          sed -i '/^<<<<<<< /d' streams.m3u8 2>/dev/null || true
          sed -i '/^=======/d' streams.m3u8 2>/dev/null || true
          sed -i '/^>>>>>>> /d' streams.m3u8 2>/dev/null || true
          awk '!seen[$0]++' streams.m3u8 > streams_clean.m3u8 2>/dev/null || true
          mv streams_clean.m3u8 streams.m3u8 2>/dev/null || true
          
          if ! grep -q "^#EXTM3U" streams.m3u8; then
            echo "❌ Invalid M3U8"
            exit 1
          fi
          echo "✅ M3U8 validated"

      - name: Show playlist preview
        run: |
          echo "📄 Generated streams.m3u8:"
          echo "=========================="
          head -30 streams.m3u8
          echo "..."

      - name: Send Telegram Notification
        uses: cbrgm/telegram-github-action@v1
        if: success()
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            📺 *YouTube Playlist Updated*
            
            ✅ *Active:* ${{ steps.stats.outputs.active }}/${{ steps.stats.outputs.total }}
            🔧 *Streamlink Ready:* ${{ steps.stats.outputs.streamlink_working }}
            
            📊 *Quality:*
            • 1080p: ${{ steps.stats.outputs.quality_1080p }}
            • 720p: ${{ steps.stats.outputs.quality_720p }}
            • 480p: ${{ steps.stats.outputs.quality_480p }}
            
            📡 *Channels:* ${{ steps.stats.outputs.active_channels }}
            
            🎬 *HOW TO PLAY (No Stutter):*
            ```bash
            # Install Streamlink first:
            # Windows: choco install streamlink
            # macOS: brew install streamlink  
            # Linux: sudo apt install streamlink
            
            # Play single channel:
            streamlink --player vlc "https://www.youtube.com/watch?v=VIDEO_ID" best
            
            # Or use the playlist:
            streamlink --player vlc "URL_FROM_M3U8" best
            ```
            
            ⏰ *Refreshed:* $(date -u '+%H:%M UTC')
        continue-on-error: true

      - name: Commit and push
        env:
          PAT_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f streams.m3u8 streamlink_playlist.sh stats.txt
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          git commit -m "🔄 Update Streamlink playlist [$(date -u +%H:%M)] - ${{ steps.stats.outputs.active }}/${{ steps.stats.outputs.total }} active"
          
          MAX_RETRIES=5
          DELAY=10
          SUCCESS=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "📤 Attempt $i/$MAX_RETRIES..."
            
            if ! git pull --rebase origin main 2>/dev/null; then
              git pull origin main || true
            fi
            
            if git push "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main; then
              echo "✅ Pushed on attempt $i"
              SUCCESS=true
              break
            else
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️ Retry in ${DELAY}s..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              fi
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ Push failed"
            exit 1
          fi

      - name: Cleanup sensitive files
        if: always()
        run: |
          shred -u cookies.txt 2>/dev/null || rm -f cookies.txt
          shred -u stats.txt 2>/dev/null || rm -f stats.txt
          shred -u wgcf-profile.conf 2>/dev/null || rm -f wgcf-profile.conf
          echo "🧹 Cleaned up"

      - name: Send failure notification
        if: failure()
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            ❌ *Workflow Failed*
            
            Repo: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
